<style>
  /* ===================================================================
   Testcoordinator — Brutalist Minimal Design System
   Aesthetic: Stark black & white, bold typography, thick borders,
   maximum readability, WCAG 2.1 AA compliant.
   =================================================================== */

  :root {
    /* Base palette — Light mode */
    --bg: #ffffff;
    --fg: #000000;
    --bg-surface: #f5f5f5;
    --border: #000000;
    --border-dim: #cccccc;
    --muted: #555555;

    /* Functional */
    --focus-ring: #000000;
    --btn-primary-bg: #000000;
    --btn-primary-fg: #ffffff;
    --btn-secondary-bg: #ffffff;
    --btn-secondary-fg: #000000;
    --danger: #c2410c;
    --warn: #92400e;

    /* Accommodation badge colors — light mode (all 4.5:1+ on white) */
    --badge-sg: #0d7377;
    --badge-ra: #c2410c;
    --badge-11: #7c3aed;
    --badge-prox: #1d4ed8;
    --badge-pmpt: #92400e;
    --badge-other: #4b5563;
    --badge-floor: #000000;

    /* Sizing & Typography */
    --border-w: 2px;
    --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-display: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --min-target: 44px;
  }

  [data-theme="dark"] {
    --bg: #000000;
    --fg: #ffffff;
    --bg-surface: #111111;
    --border: #ffffff;
    --border-dim: #333333;
    --muted: #aaaaaa;
    --focus-ring: #ffffff;
    --btn-primary-bg: #ffffff;
    --btn-primary-fg: #000000;
    --btn-secondary-bg: #000000;
    --btn-secondary-fg: #ffffff;
    --danger: #f97316;
    --warn: #fbbf24;

    /* Accommodation badge colors — dark mode (all 4.5:1+ on black) */
    --badge-sg: #2dd4bf;
    --badge-ra: #f97316;
    --badge-11: #a78bfa;
    --badge-prox: #38bdf8;
    --badge-pmpt: #fbbf24;
    --badge-other: #9ca3af;
    --badge-floor: #ffffff;
  }

  /* ---------- Reset & Base ---------- */
  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    font-size: 14px;
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font-body);
    background-color: var(--bg);
    color: var(--fg);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ---------- Layout Elements ---------- */

  .top-bar {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    background: var(--bg);
    border-bottom: 3px solid var(--border);
    padding: 0.75rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .top-bar__title {
    font-family: var(--font-display);
    font-size: 1.3rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--fg);
    white-space: nowrap;
  }

  .top-bar__nav {
    display: flex;
    gap: 0.25rem;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .nav-btn {
    background: transparent;
    border: var(--border-w) solid var(--border-dim);
    color: var(--muted);
    padding: 0.5rem 1rem;
    font-family: var(--font-display);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.8rem;
    cursor: pointer;
    min-height: var(--min-target);
  }

  .nav-btn:hover {
    color: var(--fg);
    background: var(--bg-surface);
    border-color: var(--border);
  }

  .nav-btn.active {
    color: var(--btn-primary-fg);
    border-color: var(--border);
    background: var(--btn-primary-bg);
  }

  /* ---------- Theme Toggle ---------- */
  .theme-toggle {
    background: var(--btn-secondary-bg);
    border: var(--border-w) solid var(--border);
    color: var(--fg);
    padding: 0.5rem 0.75rem;
    font-family: var(--font-display);
    font-weight: 900;
    font-size: 0.85rem;
    cursor: pointer;
    min-height: var(--min-target);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }

  .theme-toggle:hover {
    background: var(--bg-surface);
  }

  /* ---------- Grade Switcher ---------- */
  .grade-switcher {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.5rem 2rem;
    background: var(--bg-surface);
    border-bottom: var(--border-w) solid var(--border);
    position: sticky;
    top: 62px;
    z-index: 99;
    flex-wrap: wrap;
  }

  .grade-switcher__label {
    font-family: var(--font-display);
    font-size: 0.8rem;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--muted);
  }

  .grade-btn,
  .floor-btn {
    background: transparent;
    border: var(--border-w) solid var(--border-dim);
    color: var(--muted);
    padding: 0.3rem 1rem;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    min-height: var(--min-target);
  }

  .grade-btn:hover,
  .floor-btn:hover {
    border-color: var(--border);
    color: var(--fg);
  }

  .grade-btn.active,
  .floor-btn.active {
    background: var(--btn-primary-bg);
    border-color: var(--border);
    color: var(--btn-primary-fg);
  }

  /* ---------- Typography ---------- */
  h2 {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--fg);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  h2::before {
    content: none;
  }

  /* ---------- Components ---------- */

  .card {
    background: var(--bg);
    border: var(--border-w) solid var(--border);
    padding: 1.5rem;
    margin: 1rem;
    position: relative;
  }

  .card::after {
    content: none;
  }

  /* Forms */
  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .form-row>label {
    flex: 1 1 200px;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    background: var(--bg);
    border: var(--border-w) solid var(--border);
    color: var(--fg);
    padding: 0.7rem 0.9rem;
    font-family: var(--font-body);
    font-size: 1rem;
    min-height: var(--min-target);
  }

  input:focus,
  select:focus {
    outline: 3px solid var(--focus-ring);
    outline-offset: 2px;
  }

  fieldset {
    border: var(--border-w) solid var(--border);
    padding: 1rem;
    margin-bottom: 1rem;
  }

  legend {
    font-family: var(--font-display);
    font-size: 0.85rem;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--fg);
    padding: 0 0.5rem;
  }

  .cb,
  .form-row>label.cb {
    display: inline-flex;
    flex-direction: row;
    align-items: center;
    flex: 0 0 auto;
    gap: 0.5rem;
    margin-right: 1rem;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--fg);
    min-height: var(--min-target);
  }

  .cb input {
    accent-color: var(--fg);
  }

  /* Buttons */
  .btn {
    padding: 0.7rem 1.5rem;
    font-family: var(--font-display);
    font-weight: 900;
    text-transform: uppercase;
    font-size: 0.85rem;
    border: var(--border-w) solid var(--border);
    cursor: pointer;
    min-height: var(--min-target);
    letter-spacing: 0.03em;
    background: var(--btn-secondary-bg);
    color: var(--btn-secondary-fg);
  }

  .btn:active {
    transform: translate(1px, 1px);
  }

  .btn--primary {
    background: var(--btn-primary-bg);
    color: var(--btn-primary-fg);
    border-color: var(--border);
  }

  .btn--secondary {
    background: var(--btn-secondary-bg);
    color: var(--btn-secondary-fg);
    border-color: var(--border);
  }

  .btn--accent {
    background: var(--btn-primary-bg);
    color: var(--btn-primary-fg);
    border-color: var(--border);
  }

  .btn--danger {
    background: var(--bg);
    color: var(--danger);
    border-color: var(--danger);
  }

  .btn--gold {
    background: var(--btn-primary-bg);
    color: var(--btn-primary-fg);
    border-color: var(--border);
  }

  .btn--sm {
    padding: 0.4rem 0.85rem;
    font-size: 0.75rem;
    min-height: 36px;
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Tables */
  .table-wrap {
    border: var(--border-w) solid var(--border);
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.95rem;
  }

  th {
    background: var(--btn-primary-bg);
    color: var(--btn-primary-fg);
    font-family: var(--font-display);
    font-weight: 900;
    text-transform: uppercase;
    font-size: 0.8rem;
    text-align: left;
    padding: 0.85rem 1rem;
    border-bottom: 3px solid var(--border);
  }

  td {
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--border-dim);
    color: var(--fg);
  }

  tr:hover td {
    background: var(--bg-surface);
  }

  .actions {
    white-space: nowrap;
  }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    font-family: var(--font-display);
    font-size: 0.7rem;
    font-weight: 900;
    text-transform: uppercase;
    vertical-align: middle;
    border-width: var(--border-w);
    border-style: solid;
  }

  .badge--sg {
    border-color: var(--badge-sg);
    color: var(--badge-sg);
  }

  .badge--ra {
    border-color: var(--badge-ra);
    color: var(--badge-ra);
  }

  .badge--grade {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }

  .badge--11 {
    border-color: var(--badge-11);
    color: var(--badge-11);
  }

  .badge--prox {
    border-color: var(--badge-prox);
    color: var(--badge-prox);
  }

  .badge--pmpt {
    border-color: var(--badge-pmpt);
    color: var(--badge-pmpt);
  }

  .badge--other {
    border-color: var(--badge-other);
    color: var(--badge-other);
  }

  .badge--floor {
    border-color: var(--badge-floor);
    color: var(--badge-floor);
  }

  .count-badge {
    display: inline-block;
    background: var(--btn-primary-bg);
    color: var(--btn-primary-fg);
    padding: 0.15rem 0.6rem;
    font-size: 0.75rem;
    font-weight: 900;
    vertical-align: middle;
  }

  /* Room Cards */
  .room-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1rem;
  }

  .room-card {
    background: var(--bg);
    border: var(--border-w) solid var(--border);
    padding: 1.25rem;
    position: relative;
  }

  .room-card:hover {
    border-width: 3px;
  }

  .room-card h3 {
    font-family: var(--font-display);
    color: var(--fg);
    font-weight: 900;
    font-size: 1rem;
    margin-bottom: 0.25rem;
  }

  .room-card h3::before {
    content: none;
  }

  .room-card p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }

  .room-num {
    font-weight: 400;
    font-size: 0.85rem;
    color: var(--muted);
  }

  .room-teacher {
    color: var(--fg);
    font-weight: 700;
  }

  .hallway-section {
    margin-bottom: 1.5rem;
  }

  .hallway-header {
    font-family: var(--font-display);
    font-size: 0.9rem;
    padding: 0.5rem 0.75rem;
    background: var(--bg-surface);
    border-left: 3px solid var(--border);
    margin-bottom: 0.75rem;
    color: var(--fg);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .floor-header {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 900;
    padding: 0.5rem 0.75rem;
    background: var(--bg-surface);
    border-left: 4px solid var(--border);
    margin-bottom: 1rem;
    color: var(--fg);
    text-transform: uppercase;
  }

  /* Staging / Assignment Layouts */
  .assign-layout,
  .staging-layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 1.5rem;
    padding: 1.5rem;
    min-height: calc(100vh - 100px);
  }

  @media (max-width: 900px) {
    .assign-layout,
    .staging-layout {
      grid-template-columns: 1fr;
    }
  }

  .panel {
    overflow: auto;
  }

  .panel--students {
    max-height: calc(100vh - 120px);
  }

  /* List items */
  .student-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    list-style: none;
  }

  .student-chip {
    background: var(--bg-surface);
    border: var(--border-w) solid var(--border-dim);
    padding: 0.6rem 0.75rem;
    cursor: grab;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.4rem;
    min-width: 0;
  }

  .student-chip > strong {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1 1 0;
  }

  .student-chip:hover {
    border-color: var(--border);
  }

  .student-chip.dragging {
    opacity: 0.4;
  }

  .chip-meta {
    color: var(--muted);
    font-size: 0.75rem;
    flex-shrink: 0;
  }

  /* Staging Groups */
  .staging-group {
    border: var(--border-w) solid var(--border);
    margin-bottom: 1rem;
    background: var(--bg);
  }

  .staging-group__header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 1rem;
    background: var(--bg-surface);
    border-bottom: var(--border-w) solid var(--border-dim);
  }

  .staging-group__header h3 {
    font-family: var(--font-display);
    font-size: 0.9rem;
    color: var(--fg);
    margin: 0;
  }

  .staging-group__header h3::before {
    content: none;
  }

  .staging-group__actions {
    display: flex;
    gap: 0.5rem;
  }

  .staging-group__members {
    min-height: 60px;
    padding: 0.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .staging-group__members.drag-over {
    background: var(--bg-surface);
  }

  .student-chip--staged {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--bg-surface);
    border: var(--border-w) solid var(--border-dim);
    padding: 0.4rem 0.6rem;
    font-size: 0.8rem;
  }

  /* Grid Interaction */
  .grid-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1rem;
    padding: 1rem;
    background: var(--bg);
    border: var(--border-w) solid var(--border);
  }

  .grid-toolbar label {
    font-family: var(--font-display);
    font-size: 0.8rem;
    text-transform: uppercase;
    color: var(--fg);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .room-info-bar {
    margin-bottom: 1rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .info-chip {
    padding: 0.3rem 0.6rem;
    background: var(--bg-surface);
    border: var(--border-w) solid var(--border-dim);
    color: var(--fg);
    font-family: var(--font-display);
    font-size: 0.75rem;
    text-transform: uppercase;
  }

  .proctor-label {
    background: var(--bg-surface);
    border: var(--border-w) solid var(--border);
    text-align: center;
    padding: 0.5rem;
    font-family: var(--font-display);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--fg);
    margin-bottom: 1rem;
  }

  .grid-container {
    display: grid;
    gap: 6px;
    background: var(--bg-surface);
    padding: 10px;
    border: var(--border-w) solid var(--border);
  }

  .grid-cell {
    background: var(--bg);
    border: var(--border-w) solid var(--border-dim);
    min-height: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: default;
  }

  .grid-cell::before {
    content: attr(data-coord);
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 0.6rem;
    color: var(--muted);
    font-family: var(--font-display);
  }

  .grid-cell.occupied {
    background: var(--bg-surface);
    border-color: var(--border);
    cursor: grab;
  }

  .cell-name {
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--fg);
  }

  .cell-codes {
    margin-top: 4px;
  }

  .cell-iep-btn {
    margin-top: 4px;
    padding: 0.15rem 0.4rem !important;
    font-size: 0.65rem !important;
  }

  /* Filler Toggle */
  .filler-toggle {
    background: var(--bg-surface);
    border: var(--border-w) solid var(--border);
    padding: 0.4rem 0.8rem;
    font-family: var(--font-display);
    font-size: 0.8rem;
    text-transform: uppercase;
    color: var(--fg);
    cursor: pointer;
    min-height: var(--min-target);
  }

  .filler-toggle.active {
    background: var(--btn-primary-bg);
    color: var(--btn-primary-fg);
  }

  .grid-cell.filler {
    background: var(--bg-surface);
    border-style: solid;
    border-color: var(--muted);
    cursor: pointer;
  }

  .grid-cell.filler::after {
    content: '\2716';
    font-size: 1.5rem;
    color: var(--muted);
  }

  .grid-cell.read-aloud {
    border-color: var(--danger);
    border-width: 3px;
  }

  .grid-cell.read-aloud .cell-name {
    color: var(--danger);
  }

  .grid-cell.drag-over {
    background: var(--bg-surface);
    border: var(--border-w) dashed var(--border);
  }

  .grid-cell.warn-proximity {
    border-color: var(--warn);
    border-width: 3px;
  }

  .warnings .warn {
    background: var(--bg-surface);
    border: var(--border-w) solid var(--warn);
    border-left: 4px solid var(--warn);
    color: var(--warn);
    padding: 0.5rem 1rem;
    font-size: 0.85rem;
    margin-bottom: 0.5rem;
  }

  /* ---------- Designer Specific ---------- */

  .designer-layout {
    display: grid;
    grid-template-columns: 240px 1fr 260px;
    gap: 1rem;
    padding: 1rem;
    min-height: calc(100vh - 100px);
  }

  @media (max-width: 1000px) {
    .designer-layout {
      grid-template-columns: 1fr;
    }
  }

  .designer-sidebar h2,
  .designer-props h2 {
    font-size: 0.9rem;
  }

  .designer-divider {
    height: 1px;
    background: var(--border-dim);
    margin: 1rem 0;
    border: 0;
    outline: none;
  }

  .designer-main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .designer-toolbar {
    display: flex;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1rem;
  }

  .designer-info {
    color: var(--muted);
    font-size: 0.85rem;
  }

  .zoom-controls {
    margin-left: auto;
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .zoom-label {
    font-family: var(--font-display);
    color: var(--fg);
    width: 40px;
    text-align: center;
  }

  .designer-canvas-scroll {
    flex: 1;
    overflow: auto;
    border: var(--border-w) solid var(--border);
    background: var(--bg);
  }

  .designer-canvas {
    position: relative;
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--border-dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--border-dim) 1px, transparent 1px);
    cursor: crosshair;
    user-select: none;
  }

  .designer-room {
    position: absolute;
    border: var(--border-w) solid var(--border);
    background: var(--bg-surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--fg);
    font-family: var(--font-display);
    cursor: move;
  }

  .designer-room:hover {
    z-index: 2;
    border-width: 3px;
  }

  .designer-room.selected {
    border: 3px dashed var(--fg);
    z-index: 3;
  }

  .designer-room-icon {
    opacity: 0.8;
    margin-bottom: 2px;
  }

  .designer-room-label {
    font-size: 0.75rem;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--fg);
  }

  .designer-room-size {
    font-size: 0.6rem;
    color: var(--muted);
  }

  .designer-floor-badge {
    font-size: 0.55rem;
    font-weight: 900;
    text-transform: uppercase;
    position: absolute;
    top: 2px;
    right: 2px;
