<style>
  /* ===================================================================
   Testcoordinator — Industrial Blueprint Design System
   Aesthetic: Technical, precise, high-contrast, mechanical.
   =================================================================== */

  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    /* Blueprint Palette */
    --bp-paper: #0f172a;
    /* Deep Slate */
    --bp-ink: #f1f5f9;
    /* Cool White */
    --bp-ink-muted: #94a3b8;
    /* Muted Blue Gray */
    --bp-cyan: #2dd4bf;
    /* Technical Teal */
    --bp-cyan-dim: rgba(45, 212, 191, 0.15);
    --bp-grid: rgba(45, 212, 191, 0.05);
    --bp-warn: #fbbf24;
    /* Amber */
    --bp-danger: #f97316;
    /* Orange (deutan/protan safe — replaces rose) */
    --bp-surface: #1e293b;
    /* Lighter Slate */

    /* Sizing & Rhythm */
    --unit: 8px;
    --radius-sm: 2px;
    --radius-md: 4px;
    --border-width: 1px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;

    --shadow-technical: 4px 4px 0px rgba(0, 0, 0, 0.3);
  }

  /* ---------- Reset & Base ---------- */
  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    font-size: 14px;
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font-body);
    background-color: var(--bp-paper);
    background-image:
      linear-gradient(var(--bp-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bp-grid) 1px, transparent 1px);
    background-size: 30px 30px;
    color: var(--bp-ink);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Technical Corner Markings */
  body::before,
  body::after {
    content: '';
    position: fixed;
    width: 40px;
    height: 40px;
    border: 2px solid var(--bp-cyan-dim);
    pointer-events: none;
    z-index: 1000;
  }

  body::before {
    top: 20px;
    left: 20px;
    border-right: 0;
    border-bottom: 0;
  }

  body::after {
    bottom: 20px;
    right: 20px;
    border-left: 0;
    border-top: 0;
  }

  /* ---------- Layout Elements ---------- */

  .top-bar {
    display: flex;
    align-items: center;
    gap: 2rem;
    background: var(--bp-paper);
    border-bottom: 2px solid var(--bp-cyan);
    padding: 1rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
  }

  .top-bar__title {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--bp-cyan);
  }

  .top-bar__nav {
    display: flex;
    gap: 0.5rem;
    margin-left: auto;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid var(--bp-cyan-dim);
    color: var(--bp-ink-muted);
    padding: 0.5rem 1rem;
    font-family: var(--font-display);
    font-weight: 500;
    text-transform: uppercase;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }

  .nav-btn::before {
    content: '[';
    margin-right: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .nav-btn::after {
    content: ']';
    margin-left: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .nav-btn:hover {
    color: var(--bp-ink);
    background: var(--bp-cyan-dim);
    border-color: var(--bp-cyan);
  }

  .nav-btn.active {
    color: var(--bp-cyan);
    border-color: var(--bp-cyan);
    background: var(--bp-cyan-dim);
    box-shadow: inset 0 -2px 0 0 var(--bp-cyan);
  }

  .nav-btn.active::before,
  .nav-btn.active::after {
    opacity: 1;
  }

  /* ---------- Grade Switcher ---------- */
  .grade-switcher {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 2rem;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(8px);
    border-bottom: 1px dashed var(--bp-cyan-dim);
    position: sticky;
    top: 62px;
    z-index: 99;
  }

  .grade-switcher__label {
    font-family: var(--font-display);
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--bp-ink-muted);
  }

  .grade-btn,
  .floor-btn {
    background: transparent;
    border: 1px solid var(--bp-ink-muted);
    color: var(--bp-ink-muted);
    padding: 0.2rem 0.8rem;
    font-size: 0.7rem;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .grade-btn:hover,
  .floor-btn:hover {
    border-color: var(--bp-ink);
    color: var(--bp-ink);
  }

  .grade-btn.active,
  .floor-btn.active {
    background: var(--bp-cyan);
    border-color: var(--bp-cyan);
    color: var(--bp-paper);
  }

  /* ---------- Typography ---------- */
  h2 {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--bp-cyan);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  h2::before {
    content: '//';
    opacity: 0.5;
  }

  /* ---------- Components ---------- */

  .card {
    background: var(--bp-surface);
    border: 1px solid var(--bp-cyan-dim);
    border-radius: var(--radius-sm);
    padding: 1.5rem;
    margin: 1rem;
    position: relative;
    box-shadow: var(--shadow-technical);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card::after {
    content: attr(id);
    position: absolute;
    top: -10px;
    right: 10px;
    font-family: var(--font-display);
    font-size: 0.6rem;
    color: var(--bp-cyan);
    background: var(--bp-paper);
    padding: 0 4px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* Forms */
  .form-row {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .form-row>label {
    flex: 1 1 200px;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    color: var(--bp-ink-muted);
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
  }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    background: var(--bp-paper);
    border: 1px solid var(--bp-cyan-dim);
    color: var(--bp-ink);
    padding: 0.6rem 0.8rem;
    font-family: var(--font-body);
    font-size: 0.9rem;
    transition: border-color 0.2s;
  }

  input:focus,
  select:focus {
    outline: none;
    border-color: var(--bp-cyan);
    box-shadow: 0 0 0 1px var(--bp-cyan);
  }

  fieldset {
    border: 1px dashed var(--bp-cyan-dim);
    padding: 1rem;
    margin-bottom: 1rem;
  }

  legend {
    font-family: var(--font-display);
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--bp-cyan);
    padding: 0 0.5rem;
  }

  .cb,
  .form-row > label.cb {
    display: inline-flex;
    flex-direction: row;
    align-items: center;
    flex: 0 0 auto;
    gap: 0.5rem;
    margin-right: 1rem;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--bp-ink-muted);
  }

  .cb input {
    accent-color: var(--bp-cyan);
  }

  /* Buttons */
  .btn {
    padding: 0.6rem 1.25rem;
    font-family: var(--font-display);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.75rem;
    border: none;
    cursor: pointer;
    transition: all 0.1s ease;
    clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
  }

  .btn:active {
    transform: translate(2px, 2px);
  }

  .btn--primary {
    background: var(--bp-cyan);
    color: var(--bp-paper);
  }

  .btn--secondary {
    background: var(--bp-surface);
    color: var(--bp-ink);
    border: 1px solid var(--bp-cyan-dim);
  }

  .btn--accent {
    background: var(--bp-warn);
    color: var(--bp-paper);
  }

  .btn--danger {
    background: var(--bp-danger);
    color: var(--bp-ink);
  }

  .btn--gold {
    background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
    color: #000;
  }

  .btn--sm {
    padding: 0.35rem 0.75rem;
    font-size: 0.7rem;
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Tables */
  .table-wrap {
    border: 1px solid var(--bp-cyan-dim);
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  th {
    background: var(--bp-surface);
    color: var(--bp-cyan);
    font-family: var(--font-display);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 0.7rem;
    text-align: left;
    padding: 0.75rem 1rem;
    border-bottom: 2px solid var(--bp-cyan-dim);
  }

  td {
    padding: 0.75rem 1rem;
    border-bottom: 1px dashed rgba(45, 212, 191, 0.2);
    color: var(--bp-ink);
  }

  tr:hover td {
    background: rgba(45, 212, 191, 0.05);
  }

  /* Badges */
  .badge {
    display: inline-block;
    padding: 0.1rem 0.4rem;
    font-family: var(--font-display);
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    border-radius: 2px;
    vertical-align: middle;
  }

  .badge--sg {
    border: 1px solid var(--bp-cyan);
    color: var(--bp-cyan);
  }

  .badge--ra {
    border: 1px solid var(--bp-danger);
    color: var(--bp-danger);
  }

  .badge--grade {
    background: var(--bp-ink);
    color: var(--bp-paper);
  }

  /* Custom Badge colors mapping old ones */
  .badge--11 {
    border: 1px solid #c084fc;
    color: #c084fc;
  }

  /* Purple */
  .badge--prox {
    border: 1px solid #38bdf8;
    color: #38bdf8;
  }

  /* Light Blue */
  .badge--pmpt {
    border: 1px solid #fbbf24;
    color: #fbbf24;
  }

  /* Amber (deutan/protan safe — replaces pink) */
  .badge--other {
    border: 1px solid var(--bp-ink-muted);
    color: var(--bp-ink-muted);
  }

  .badge--floor {
    background: var(--bp-cyan-dim);
    color: var(--bp-cyan);
    border: 1px solid var(--bp-cyan);
  }

  .count-badge {
    display: inline-block;
    background: var(--bp-cyan);
    color: var(--bp-paper);
    padding: 0.1rem 0.5rem;
    border-radius: 2px;
    font-size: 0.7rem;
    font-weight: 700;
    vertical-align: middle;
  }


  /* Room Cards */
  .room-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1rem;
  }

  .room-card {
    background: var(--bp-paper);
    border: 1px solid var(--bp-cyan-dim);
    padding: 1.25rem;
    position: relative;
    transition: border-color 0.2s;
  }

  .room-card:hover {
    border-color: var(--bp-cyan);
    box-shadow: var(--shadow-technical);
  }

  .room-card h3 {
    font-family: var(--font-display);
    color: var(--bp-cyan);
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.25rem;
  }

  .room-card p {
    font-size: 0.8rem;
    color: var(--bp-ink-muted);
    margin-bottom: 0.25rem;
  }

  .room-card h3::before {
    content: none;
  }

  /* remove the // */
  .room-num {
    font-weight: 400;
    font-size: 0.8rem;
    color: var(--bp-ink-muted);
  }

  .room-teacher {
    color: var(--bp-ink);
    font-weight: 600;
  }

  .hallway-section {
    margin-bottom: 1.5rem;
  }

  .hallway-header {
    font-family: var(--font-display);
    font-size: 0.85rem;
    padding: 0.4rem 0.75rem;
    background: var(--bp-surface);
    border-left: 2px solid var(--bp-cyan);
    margin-bottom: 0.75rem;
    color: var(--bp-cyan);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .floor-header {
    font-family: var(--font-display);
    font-size: 1rem;
    font-weight: 700;
    padding: 0.5rem 0.75rem;
    background: linear-gradient(90deg, rgba(45, 212, 191, 0.1) 0%, transparent 100%);
    border-left: 4px solid var(--bp-cyan);
    margin-bottom: 1rem;
    color: var(--bp-ink);
    text-transform: uppercase;
  }

  /* Staging / Assignment Layouts */
  .assign-layout,
  .staging-layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 1.5rem;
    padding: 1.5rem;
    min-height: calc(100vh - 100px);
  }

  @media (max-width: 900px) {

    .assign-layout,
    .staging-layout {
      grid-template-columns: 1fr;
    }
  }

  .panel {
    overflow: auto;
  }

  .panel--students {
    max-height: calc(100vh - 120px);
  }

  /* List items */
  .student-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    list-style: none;
  }

  .student-chip {
    background: var(--bp-surface);
    border: 1px solid var(--bp-cyan-dim);
    padding: 0.6rem 0.75rem;
    cursor: grab;
    font-size: 0.82rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .student-chip:hover {
    border-color: var(--bp-cyan);
    background: rgba(45, 212, 191, 0.05);
  }

  .student-chip.dragging {
    opacity: 0.4;
  }

  .chip-meta {
    color: var(--bp-ink-muted);
    font-size: 0.75rem;
  }

  /* Staging Groups */
  .staging-group {
    border: 1px solid var(--bp-cyan-dim);
    margin-bottom: 1rem;
    background: var(--bp-paper);
  }

  .staging-group__header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 1rem;
    background: var(--bp-surface);
    border-bottom: 1px solid var(--bp-cyan-dim);
  }

  .staging-group__header h3 {
    font-family: var(--font-display);
    font-size: 0.9rem;
    color: var(--bp-cyan);
    margin: 0;
  }

  .staging-group__header h3::before {
    content: none;
  }

  .staging-group__actions {
    display: flex;
    gap: 0.5rem;
  }

  .staging-group__members {
    min-height: 60px;
    padding: 0.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    transition: background 0.2s;
  }

  .staging-group__members.drag-over {
    background: rgba(45, 212, 191, 0.1);
  }

  .student-chip--staged {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--bp-surface);
    border: 1px solid var(--bp-cyan-dim);
    padding: 0.4rem 0.6rem;
    font-size: 0.8rem;
  }


  /* Grid Interaction */
  .grid-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1rem;
    padding: 1rem;
    background: var(--bp-paper);
    border: 1px dashed var(--bp-cyan-dim);
  }

  .grid-toolbar label {
    font-family: var(--font-display);
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--bp-cyan);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .room-info-bar {
    margin-bottom: 1rem;
    display: flex;
    gap: 0.5rem;
  }

  .info-chip {
    padding: 0.2rem 0.6rem;
    background: var(--bp-surface);
    border: 1px solid var(--bp-cyan-dim);
    color: var(--bp-ink);
    font-family: var(--font-display);
    font-size: 0.7rem;
    text-transform: uppercase;
  }

  .proctor-label {
    background: rgba(45, 212, 191, 0.1);
    border: 1px dashed var(--bp-cyan);
    text-align: center;
    padding: 0.5rem;
    font-family: var(--font-display);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--bp-cyan);
    margin-bottom: 1rem;
  }

  .grid-container {
    display: grid;
    gap: 6px;
    background: var(--bp-surface);
    padding: 10px;
    border: 1px solid var(--bp-cyan-dim);
  }

  .grid-cell {
    background: var(--bp-paper);
    border: 1px dashed rgba(45, 212, 191, 0.3);
    min-height: 80px;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    cursor: default;
  }

  .grid-cell::before {
    content: attr(data-coord);
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 0.6rem;
    color: var(--bp-ink-muted);
    font-family: var(--font-display);
  }

  .grid-cell.occupied {
    background: var(--bp-cyan-dim);
    border: 1px solid var(--bp-cyan);
    box-shadow: inset 0 0 10px rgba(45, 212, 191, 0.1);
    cursor: grab;
  }

  .cell-name {
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--bp-ink);
  }

  .cell-codes {
    margin-top: 4px;
  }

  .cell-iep-btn {
    margin-top: 4px;
    padding: 0.15rem 0.4rem !important;
    font-size: 0.65rem !important;
  }

  /* Filler Toggle */
  .filler-toggle {
    background: var(--bp-surface);
    border: 1px solid var(--bp-cyan-dim);
    padding: 0.4rem 0.8rem;
    font-family: var(--font-display);
    font-size: 0.75rem;
    text-transform: uppercase;
    color: var(--bp-cyan);
    cursor: pointer;
  }

  .filler-toggle.active {
    background: var(--bp-cyan);
    color: var(--bp-paper);
  }

  .grid-cell.filler {
    background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(148, 163, 184, 0.05) 10px, rgba(148, 163, 184, 0.05) 20px);
    border-style: solid;
    border-color: rgba(148, 163, 184, 0.2);
    cursor: pointer;
  }

  .grid-cell.filler::after {
    content: '\2716';
    font-size: 1.5rem;
    color: rgba(148, 163, 184, 0.3);
  }

  .grid-cell.read-aloud {
    border-color: var(--bp-danger);
    box-shadow: inset 0 0 0 1px var(--bp-danger), inset 0 0 15px rgba(249, 115, 22, 0.2);
  }

  .grid-cell.read-aloud .cell-name {
    color: var(--bp-danger);
  }

  .grid-cell.drag-over {
    background: rgba(45, 212, 191, 0.2);
    border: 1px dashed var(--bp-cyan);
  }

  .grid-cell.warn-proximity {
    border-color: var(--bp-warn);
    box-shadow: inset 0 0 0 1px var(--bp-warn);
  }

  .warnings .warn {
    background: rgba(251, 191, 36, 0.1);
    border: 1px solid var(--bp-warn);
    border-left: 4px solid var(--bp-warn);
    color: var(--bp-warn);
    padding: 0.5rem 1rem;
    font-size: 0.8rem;
    margin-bottom: 0.5rem;
  }

  /* ---------- Designer Specific ---------- */

  .designer-layout {
    display: grid;
    grid-template-columns: 240px 1fr 260px;
    gap: 1rem;
    padding: 1rem;
    min-height: calc(100vh - 100px);
  }

  @media (max-width: 1000px) {
    .designer-layout {
      grid-template-columns: 1fr;
    }
  }

  .designer-sidebar h2,
  .designer-props h2 {
    font-size: 0.9rem;
  }

  .designer-divider {
    height: 1px;
    background: rgba(45, 212, 191, 0.2);
    margin: 1rem 0;
    border: 0;
    outline: none;
  }

  .designer-main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .designer-toolbar {
    display: flex;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1rem;
  }

  .designer-info {
    color: var(--bp-ink-muted);
    font-size: 0.85rem;
  }

  .zoom-controls {
    margin-left: auto;
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .zoom-label {
    font-family: var(--font-display);
    color: var(--bp-cyan);
    width: 40px;
    text-align: center;
  }

  .designer-canvas-scroll {
    flex: 1;
    overflow: auto;
    border: 1px solid var(--bp-cyan-dim);
    background: var(--bp-paper);
  }

  .designer-canvas {
    position: relative;
    background-color: var(--bp-paper);
    background-image:
      linear-gradient(var(--bp-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bp-grid) 1px, transparent 1px);
    cursor: crosshair;
    user-select: none;
  }

  .designer-room {
    position: absolute;
    border: 1px solid var(--bp-cyan);
    background: var(--bp-surface);
    display: flex;
    flex-direction: column;
